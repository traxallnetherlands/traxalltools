<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraXall Tools</title>

    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #213153;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
        }

        .image-container img {
            max-width: 250px;
            height: auto;
        }

        h1 {
            color: #213153;
            margin-bottom: 10px;
        }

        .button {
            width: 100%;
            padding: 15px;
            background-color: #213153;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .button:hover {
            background-color: #18243d;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="image-container">
            <!-- Zet hier je logo -->
            <img src="logo-traxall.png" alt="TraXall Logo">
        </div>

        <h1>TraXall Tools</h1>

        <!-- KNOP 1 -->
        <a href="https://traxallnetherlands.github.io/RDW-Kentekendata/" 
           target="_blank" 
           class="button">
            RDW Kentekendata
        </a>

        <!-- KNOP 2 -->
        <a href="https://traxallnetherlands.github.io/InvoiceMatcher/" 
           target="_blank" 
           class="button">
            Invoice Matcher
        </a>

    </div>
</body>
</html>
